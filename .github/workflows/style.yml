name: Style

on:
  push:
    branches: [main, "plugin-manager"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: style-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code_style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.13"

      - name: Install dependencies
        run: |
          uv sync --no-sources --extra dev

      - name: Lint with ruff
        run: |
          uvx ruff format --check --line-length 120 src/ tests/
          uvx ruff check src/ tests/
          uvx ruff check --select I src/ tests/

      - name: Lint with mypy
        run: |
          uvx mypy --check-untyped-defs  --disable-error-code=import-untyped --disable-error-code=import-not-found src/ tests/ --exclude tests/data/
