name: Style

on:
  push:
    branches: [main, "plugin-manager"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: style-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code_style:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --no-sources --extra dev

      - name: Lint with ruff
        run: |
          uvx ruff format --check --line-length 120 src/ tests/
          uvx ruff check src/ tests/
          uvx ruff check --select I src/ tests/

      - name: Lint with mypy
        run: |
          uvx mypy --check-untyped-defs  --disable-error-code=import-untyped --disable-error-code=import-not-found src/ tests/ --exclude tests/data/

      - name: Verify ida-plugin.json schema is up to date
        run: |
          uv run hcli plugin schema -o docs/schemas/ida-plugin.json
          if ! git diff --exit-code docs/schemas/ida-plugin.json; then
            echo "::error::docs/schemas/ida-plugin.json is out of sync with the Pydantic models."
            echo "Run 'uv run hcli plugin schema -o docs/schemas/ida-plugin.json' and commit the result."
            exit 1
          fi
