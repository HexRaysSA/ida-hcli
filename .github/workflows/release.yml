name: Release

run-name: ${{ github.event.inputs.release_type == 'dev' && 'Pre-Release Version Bump' || format('Release Version Bump ({0})', github.event.inputs.release_type) }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Select release type'
        required: true
        type: choice
        options:
          - dev
          - release-patch
          - release-minor
          # Disabled: Major releases require careful coordination and are difficult to unpublish
          # - release-major
        default: 'dev'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_PYTHON: '3.13'

jobs:
  publish:
    name: Publish PyPi Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python and dependencies
        run: |
          uv python install "${{ env.UV_PYTHON }}"
          uv sync --extra dev

      - name: Bump version
        id: version
        run: |
          CURRENT_VERSION=$(uv run task current-version | tail -1)
          case "$RELEASE_TYPE" in
            "dev")
              if [[ "$CURRENT_VERSION" == *dev* ]]; then
                uv run task dev-patch
              else
                uv run task dev-start
              fi
              echo "is_release=false" >> "$GITHUB_OUTPUT"
              ;;
            "release-major"|"release-minor")
              uv run task "$RELEASE_TYPE"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              ;;
            "release-patch")
              # Remove local dev tags to ensure patch increments from last stable release
              while IFS= read -r tag; do
                git tag -d "$tag" 2>/dev/null || true
              done < <(git tag -l "*dev*")
              uv run task release-patch
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

          VERSION=$(uv run task current-version | tail -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Created version: ${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}

      - name: Publish to PyPi
        run: uv publish

  binary:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs: publish
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    platform: linux,   artifact-name: hcli-linux-x86_64 }
          - { os: ubuntu-24.04-arm, platform: linux,   artifact-name: hcli-linux-aarch64 }
          - { os: windows-latest,   platform: windows, artifact-name: hcli-windows-x86_64 }
          - { os: macos-latest,     platform: macos,   artifact-name: hcli-mac-arm64 }

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.publish.outputs.tag }}
          persist-credentials: false

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python and dependencies
        run: |
          uv python install "${{ env.UV_PYTHON }}"
          uv sync --no-sources

      - name: Set ARTIFACT_NAME
        shell: bash
        run: echo "ARTIFACT_NAME=${ARTIFACT_PREFIX}-${VERSION}" >> "$GITHUB_ENV"
        env:
          ARTIFACT_PREFIX: ${{ matrix.artifact-name }}
          VERSION: ${{ needs.publish.outputs.version }}

      - name: Build binary
        run: uv run --no-sources --with pyinstaller pyinstaller hcli.spec

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: dist/${{ matrix.artifact-name }}*
          name: ${{ matrix.artifact-name }}-${{ needs.publish.outputs.version }}
          retention-days: 1
          if-no-files-found: error

  # Combined job for both internal triggers to reduce duplication
  trigger-internal:
    name: Trigger Internal Builds
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
    steps:
      - name: Trigger ida-hcli-internal build
        run: |
          gh workflow run release.yml \
            --repo HexRaysSA/ida-hcli-internal \
            --ref main \
            --field release_type="$RELEASE_TYPE"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}

  release:
    name: Create GitHub Release
    needs: [publish, binary]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Create/Update GitHub Release with binaries
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --latest
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --latest --title "$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.publish.outputs.tag }}

  docs:
    name: Build Documentation
    needs: [publish, release]
    runs-on: ubuntu-latest
    if: needs.publish.outputs.is_release == 'true'
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python with uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python and dependencies
        run: |
          uv python install "${{ env.UV_PYTHON }}"
          uv sync --no-sources --extra docs

      - name: Build documentation
        run: uv run mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./site

  deploy-pages:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [publish, docs]
    if: needs.publish.outputs.is_release == 'true'
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
